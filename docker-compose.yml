services:

  postgres:
    image: postgres:16-alpine
    container_name: cashflow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: cashflow-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  launch-service:
    build:
      context: .
      dockerfile: src/LaunchService/CashFlow.LaunchService.Api/Dockerfile
    container_name: cashflow-launch-service
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=launch_db;Username=cashflow;Password=cashflow123"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
      Jwt__Secret: "cashflow-super-secret-key-for-jwt-signing-minimum-32-chars"
      Jwt__Issuer: "cashflow-launch-service"
      Jwt__Audience: "cashflow-platform"
    ports:
      - "5001:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  daily-balance-service:
    build:
      context: .
      dockerfile: src/DailyBalanceService/CashFlow.DailyBalanceService.Api/Dockerfile
    container_name: cashflow-daily-balance-service
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=daily_balance_db;Username=cashflow;Password=cashflow123"
      Jwt__Secret: "cashflow-super-secret-key-for-jwt-signing-minimum-32-chars"
      Jwt__Issuer: "cashflow-launch-service"
      Jwt__Audience: "cashflow-platform"
    ports:
      - "5002:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  daily-balance-worker:
    build:
      context: .
      dockerfile: src/DailyBalanceWorker/CashFlow.DailyBalanceWorker/Dockerfile
    container_name: cashflow-daily-balance-worker
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=daily_balance_db;Username=cashflow;Password=cashflow123"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cashflow-frontend
    ports:
      - "3000:80"
    depends_on:
      - launch-service
      - daily-balance-service
    restart: unless-stopped

volumes:
  postgres_data:
