services:

  postgres:
    image: postgres:16-alpine
    container_name: cashflow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  db-init:
    image: postgres:16-alpine
    container_name: cashflow-db-init
    environment:
      PGPASSWORD: postgres123
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        psql -h postgres -U postgres -tAc "SELECT 1 FROM pg_database WHERE datname='bff_db'" | grep -q 1 \
          || psql -h postgres -U postgres -c "CREATE DATABASE bff_db OWNER cashflow;"
        psql -h postgres -U postgres -c "GRANT ALL PRIVILEGES ON DATABASE bff_db TO cashflow;"
        echo "db-init OK"
    restart: "no"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: cashflow-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  bff:
    build:
      context: .
      dockerfile: src/Bff/CashFlow.Bff.Api/Dockerfile
    container_name: cashflow-bff
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=bff_db;Username=cashflow;Password=cashflow123"
      Jwt__Secret: "cashflow-super-secret-key-for-jwt-signing-minimum-32-chars"
      Jwt__Issuer: "cashflow-launch-service"
      Jwt__Audience: "cashflow-platform"
      Services__Launch: "http://launch-service:8080"
      Services__Balance: "http://daily-balance-service:8080"
      Cors__Origins__0: "http://localhost:3000"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    ports:
      - "5000:8080"
    depends_on:
      db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      launch-service:
        condition: service_started
      daily-balance-service:
        condition: service_started
    restart: unless-stopped

  launch-service:
    build:
      context: .
      dockerfile: src/LaunchService/CashFlow.LaunchService.Api/Dockerfile
    container_name: cashflow-launch-service
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=launch_db;Username=cashflow;Password=cashflow123"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
      Jwt__Secret: "cashflow-super-secret-key-for-jwt-signing-minimum-32-chars"
      Jwt__Issuer: "cashflow-launch-service"
      Jwt__Audience: "cashflow-platform"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  daily-balance-service:
    build:
      context: .
      dockerfile: src/DailyBalanceService/CashFlow.DailyBalanceService.Api/Dockerfile
    container_name: cashflow-daily-balance-service
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=daily_balance_db;Username=cashflow;Password=cashflow123"
      Jwt__Secret: "cashflow-super-secret-key-for-jwt-signing-minimum-32-chars"
      Jwt__Issuer: "cashflow-launch-service"
      Jwt__Audience: "cashflow-platform"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  daily-balance-worker:
    build:
      context: .
      dockerfile: src/DailyBalanceWorker/CashFlow.DailyBalanceWorker/Dockerfile
    container_name: cashflow-daily-balance-worker
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=daily_balance_db;Username=cashflow;Password=cashflow123"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    container_name: cashflow-otel-collector
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./infra/observability/otel-collector/config.yml:/etc/otelcol/config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      - loki
      - tempo
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: cashflow-prometheus
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector
    restart: unless-stopped

  loki:
    image: grafana/loki:3.4.2
    container_name: cashflow-loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./infra/observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.7.2
    container_name: cashflow-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infra/observability/tempo/tempo.yml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    container_name: cashflow-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: cashflow123
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cashflow-frontend
    ports:
      - "3000:80"
    depends_on:
      - bff
    restart: unless-stopped

volumes:
  postgres_data:
  loki_data:
  grafana_data:
  tempo_data:
